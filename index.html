<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="个人主页 — 学习心得、近期收藏与代码作品">
  <title>我的主页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a href="#" class="nav-logo">MyWeb</a>
      <ul class="nav-links">
        <li><a href="#about">关于</a></li>
        <li><a href="#notes">学习心得</a></li>
        <li><a href="#favorites">近期收藏</a></li>
        <li><a href="#projects">代码作品</a></li>
      </ul>
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
        <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
        <span class="theme-icon theme-icon-moon" aria-hidden="true">☽</span>
      </button>
    </nav>
  </header>

  <main>
    <section class="hero" id="top">
      <div class="hero-content">
        <p class="hero-greeting">你好，我是</p>
        <h1 class="hero-name" id="profileName">你的名字</h1>
        <p class="hero-tagline" id="profileTagline">记录学习、收藏与创造</p>
        <div class="hero-links" id="profileLinks"></div>
      </div>
      <div class="hero-decoration" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
      </div>
    </section>

    <section class="section" id="about">
      <div class="container">
        <h2 class="section-title">关于我</h2>
        <p class="about-text" id="aboutText">
          在这里写一段简短的自我介绍：你在学什么、对什么感兴趣、这个站点用来做什么。
        </p>
      </div>
    </section>

    <section class="section section-alt" id="notes">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">学习心得</h2>
          <p class="section-desc">读书笔记、课程总结与踩坑记录</p>
        </div>
        <div class="card-grid" id="notesGrid"></div>
      </div>
    </section>

    <section class="section" id="favorites">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">近期收藏</h2>
          <p class="section-desc">文章、工具、视频与其他值得回看的内容</p>
        </div>
        <div class="card-grid card-grid-compact" id="favoritesGrid"></div>
      </div>
    </section>

    <section class="section section-alt" id="projects">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">代码作品</h2>
          <p class="section-desc">个人项目与实验性代码</p>
        </div>
        <div class="card-grid" id="projectsGrid"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> <span id="footerName">你的名字</span> · 由 GitHub Pages 托管</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
